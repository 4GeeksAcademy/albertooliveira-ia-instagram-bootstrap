<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Feed - 6 Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-light bg-light sticky-top border-bottom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="fa-brands fa-instagram me-2 fs-3"></i>
                <span class="fw-bold">Instagram</span>
            </a>
            <div class="d-flex gap-2">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createPostModal">Create a new post</button>
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">Profile</a></li>
                        <li><a class="dropdown-item" href="#">Accesibility</a></li>
                        <li><a class="dropdown-item" href="#">Privacy and Data</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#">Log out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        <div class="d-flex justify-content-center gap-3">
            <a href="#" id="view-grid" class="text-secondary fs-4 active-view"><i class="fa-solid fa-table-cells"></i></a>
            <a href="#" id="view-feed" class="text-secondary fs-4"><i class="fa-solid fa-square"></i></a>
        </div>
    </div>

    <div class="container">
        
        <div id="grid-container" class="row g-3">
            <div class="col-4"><div class="ratio ratio-1x1 border"><img src="https://picsum.photos/600/600?random=1" class="img-fluid object-fit-cover"></div></div>
            <div class="col-4"><div class="ratio ratio-1x1 border"><img src="https://picsum.photos/600/600?random=2" class="img-fluid object-fit-cover"></div></div>
            <div class="col-4"><div class="ratio ratio-1x1 border"><img src="https://picsum.photos/600/600?random=3" class="img-fluid object-fit-cover"></div></div>
            <div class="col-4"><div class="ratio ratio-1x1 border"><img src="https://picsum.photos/600/600?random=4" class="img-fluid object-fit-cover"></div></div>
            <div class="col-4"><div class="ratio ratio-1x1 border"><img src="https://picsum.photos/600/600?random=5" class="img-fluid object-fit-cover"></div></div>
            <div class="col-4"><div class="ratio ratio-1x1 border"><img src="https://picsum.photos/600/600?random=6" class="img-fluid object-fit-cover"></div></div>
        </div>

        <div id="feed-container" class="d-none mx-auto py-4" style="max-width: 600px;">
            
            <div class="card mb-5">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="m-0 fs-5 fw-bold">Post Number 1</h5>
                    <span class="text-muted">08/26</span>
                </div>
                <img src="https://picsum.photos/600/600?random=1" class="card-img-top">
                <div class="card-body">
                    <p class="fw-bold mb-1">204 Likes</p>
                    <p class="card-text">This is an example of a very, very good photo that you can post on instagram.</p>
                </div>
            </div>
            
            <div class="card mb-5">
                <div class="card-header bg-white d-flex justify-content-between align-items-center"><h5 class="m-0 fs-5 fw-bold">Post Number 2</h5><span class="text-muted">08/26</span></div>
                <img src="https://picsum.photos/600/600?random=2" class="card-img-top">
                <div class="card-body"><p class="fw-bold mb-1">150 Likes</p><p class="card-text">Beautiful landscape description.</p></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createPostModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create a new post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="fw-bold">Caption:</label>
                    <textarea class="form-control mb-3" placeholder="Add the caption of your post here"></textarea>
                    <button class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-camera"></i></button>
                    <button class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-location-dot"></i></button>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-success">Publish</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
